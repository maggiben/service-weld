# Production-ish topology sketch (012 core). Not a full ops runbook.
# Secrets via env file; TLS terminates at your reverse proxy.
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: weld
    volumes:
      - weld_pgdata_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD}@db:5432/weld
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?set JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?set JWT_REFRESH_SECRET}
      BUSINESS_TZ: America/Argentina/Buenos_Aires
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        APP: web
        PORT: "3001"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3000}
    depends_on:
      - api
    ports:
      - "3001:3001"

  field:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        APP: field
        PORT: "3002"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3000}
    depends_on:
      - api
    ports:
      - "3002:3002"

  # Public marketing site → serviceweld.com (TLS at Cloudflare / reverse proxy)
  www:
    build:
      context: .
      dockerfile: apps/www/Dockerfile
      args:
        PORT: "3003"
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://serviceweld.com}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-https://app.serviceweld.com}
    ports:
      - "3003:3003"

volumes:
  weld_pgdata_prod:
