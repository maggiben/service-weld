name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Authoritative gate: schema + migrations + business-rule invariants on a
  # real PostgreSQL. Needs no Node deps — just the psql client. (specs 003/010)
  database:
    name: Database
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: weld
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s --health-timeout 5s --health-retries 20
    env:
      PGPASSWORD: test
      DATABASE_URL: postgres://postgres:test@localhost:5432/weld
    steps:
      - uses: actions/checkout@v6
      - name: Install psql client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - name: Load baseline schema (003 AC1)
        run: psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f schema.sql
      - name: Apply additive migrations
        run: |
          for f in $(ls db/migrations/*.up.sql | sort); do
            echo "applying $f"
            psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f "$f"
          done
      - name: Re-apply migrations (idempotency check)
        run: |
          for f in $(ls db/migrations/*.up.sql | sort); do
            psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f "$f"
          done
      - name: Run business-rule invariant suite (003 AC2 / 010 R1)
        run: psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f db/tests/invariants.sql

  # Install → lint → typecheck → test (+ coverage gate) → build
  app:
    name: Install · Lint · Test · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10.8.1

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (Prettier)
        run: pnpm run format:check

      - name: Typecheck
        run: pnpm -w run typecheck

      - name: Unit tests
        run: pnpm -w run test

      - name: Coverage gate (≥80%)
        run: pnpm run test:coverage

      - name: Build
        run: pnpm -w run build
        env:
          # Next.js / Nest build-time placeholders (no secrets)
          NEXT_TELEMETRY_DISABLED: "1"
          NODE_ENV: production

  # Single aggregate status for the README badge (pass only if all jobs pass)
  ci:
    name: CI
    runs-on: ubuntu-latest
    needs: [database, app]
    if: always()
    steps:
      - name: Check job results
        run: |
          echo "database=${{ needs.database.result }}"
          echo "app=${{ needs.app.result }}"
          if [ "${{ needs.database.result }}" != "success" ] || [ "${{ needs.app.result }}" != "success" ]; then
            echo "::error::CI failed (database=${{ needs.database.result }}, app=${{ needs.app.result }})"
            exit 1
          fi
          echo "CI passed"
